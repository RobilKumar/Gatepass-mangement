spring.application.name=gatepass-management
server.port=8080

# SQL Server Express default instance example:
# spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=GatepassDB;encrypt=true;trustServerCertificate=true
#
# If your SQL Server Express is configured on TCP port 1433, use:
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=GatepassDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Reset@12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# CORS for local + LAN hosting.
# Add your frontend URL here if you host on a fixed IP/domain, for example:
# app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://192.168.1.25:5173
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://192.168.*.*,http://10.*.*.*,http://172.16.*.*,http://172.17.*.*,http://172.18.*.*,http://172.19.*.*,http://172.20.*.*,http://172.21.*.*,http://172.22.*.*,http://172.23.*.*,http://172.24.*.*,http://172.25.*.*,http://172.26.*.*,http://172.27.*.*,http://172.28.*.*,http://172.29.*.*,http://172.30.*.*,http://172.31.*.*
